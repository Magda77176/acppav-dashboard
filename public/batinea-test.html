          <div style={{background:card,borderRadius:12,border:`1px solid ${bdr}`,padding:"28px"}}>
            <div style={{fontSize:13,fontWeight:700,color:muted,textTransform:"uppercase",letterSpacing:"0.03em",marginBottom:16}}>Montée en puissance</div>
            {[{p:"Mois 1-2",pct:5,l:"Diagnostic & cadrage",c:"#3B82F6"},{p:"Mois 3",pct:20,l:"Premiers quick wins",c:"#F59E0B"},{p:"Mois 4",pct:45,l:"Montée en puissance",c:"#7C3AED"},{p:"Mois 5",pct:65,l:"Résultats mesurés",c:"#10B981"},{p:"Mois 6",pct:80,l:"Production complète",c:"#059669"},{p:"Mois 7-12",pct:100,l:"ROI cumulé",c:blue}].map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:16,padding:"12px 0",borderBottom:i<5?`1px solid #F1F5F9`:"none"}}>
                <span style={{width:70,fontSize:13,fontWeight:600,color:s.c}}>{s.p}</span>
                <div style={{flex:1,background:"#F1F5F9",borderRadius:4,height:8}}>
                  <div style={{height:8,borderRadius:4,background:s.c,width:`${s.pct}%`,transition:"width .4s"}} />
                </div>
                <span style={{fontSize:13,color:"#64748B",width:160}}>{s.l}</span>
                <span style={{fontSize:14,fontWeight:700,color:s.c,width:40,textAlign:"right"}}>{s.pct}%</span>
              </div>
            ))}
          </div>
        </>}

        {/* ========= SUBSIDIES ========= */}
        {activeTab==="subs" && <>
          <div style={{background:card,borderRadius:12,border:`1px solid ${bdr}`,padding:"36px",textAlign:"center",marginBottom:24}}>
            <div style={{fontSize:13,fontWeight:600,color:muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Économies estimées sur le projet</div>
            <div style={{fontSize:44,fontWeight:900,color:blue,marginTop:12}}>16 500 – 27 000 €</div>
          </div>

          {subsidies.map((s,i)=>(
            <div key={i} style={{background:card,borderRadius:12,border:`1px solid ${bdr}`,padding:"24px",marginBottom:12,borderLeft:`4px solid ${s.color}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:17,fontWeight:700}}>{s.name}</span>
                    <span style={{padding:"3px 10px",borderRadius:20,background:`${s.color}10`,color:s.color,fontSize:11,fontWeight:600}}>{s.lot}</span>
                    <span style={{padding:"3px 10px",borderRadius:20,background:"#F0FDF4",color:green,fontSize:11,fontWeight:600}}>✓ {s.status}</span>
                  </div>
                  <div style={{fontSize:14,color:"#475569",lineHeight:1.6,marginBottom:12}}>{s.detail}</div>
                  <div style={{fontSize:12,fontWeight:600,color:muted,marginBottom:4}}>Conditions</div>
                  <div style={{fontSize:13,color:"#64748B",lineHeight:1.6,marginBottom:12}}>{s.conditions}</div>
                  <div style={{fontSize:12,fontWeight:600,color:muted,marginBottom:4}}>Action requise</div>
                  <div style={{fontSize:13,color:"#334155",lineHeight:1.6,fontWeight:500}}>{s.action}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:muted}}>Estimation</div>
                  <div style={{fontSize:28,fontWeight:800,color:s.color}}>{s.amount}</div>
                  <div style={{fontSize:12,color:"#94A3B8",marginTop:4}}>Taux : {s.rate}</div>
                </div>
              </div>
            </div>
          ))}

          <div style={{background:"#FFFBEB",borderRadius:12,border:"1px solid #FDE68A",padding:"20px",marginTop:20}}>
            <div style={{fontSize:13,fontWeight:700,color:"#D97706",marginBottom:8}}>Structure de facturation</div>
            <div style={{fontSize:13,color:"#92400E",lineHeight:1.7}}>Projet découpé en 3 lots distincts alignés sur les dispositifs d’aide. Chaque facture mentionne le lot, l'intitulé et les livrables. Les montants sont des estimations — l'éligibilité définitive dépend de l'instruction des dossiers.</div>
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Roadmap />);
</script>
</body>
</html>
